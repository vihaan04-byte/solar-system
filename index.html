<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #infoCard {
      display: none;
      position: fixed;
      top: 50%;
      right: 30px;
      transform: translateY(-50%);
      width: 300px;
      background: linear-gradient(135deg, rgba(5, 15, 35, 0.95), rgba(10, 25, 55, 0.95));
      border: 1px solid rgba(100, 180, 255, 0.25);
      border-radius: 20px;
      padding: 28px;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      backdrop-filter: blur(20px);
      z-index: 20;
      box-shadow: 0 0 60px rgba(80, 160, 255, 0.2), 0 20px 40px rgba(0,0,0,0.5);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-50%) translateX(20px); }
      to   { opacity: 1; transform: translateY(-50%) translateX(0); }
    }
    #infoCard .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(100, 180, 255, 0.15); }
    #infoCard .card-dot { width: 10px; height: 10px; border-radius: 50%; background: #7ecfff; box-shadow: 0 0 10px #7ecfff; }
    #infoCard h2 { font-size: 24px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px; margin: 0; }
    #infoCard .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; padding: 8px 12px; background: rgba(255,255,255,0.04); border-radius: 8px; }
    #infoCard .label { color: #6a9bbf; text-transform: uppercase; font-size: 11px; letter-spacing: 0.8px; }
    #infoCard .value { color: #fff; font-weight: 600; font-size: 13px; }
    #infoCard .fact { margin-top: 16px; font-size: 12px; color: #8ab4d4; line-height: 1.7; background: rgba(100, 180, 255, 0.06); border-left: 2px solid rgba(100, 180, 255, 0.4); border-radius: 0 8px 8px 0; padding: 10px 14px; }
    #closeCard { position: absolute; top: 14px; right: 16px; background: rgba(255,255,255,0.08); border: none; color: #aaa; font-size: 14px; cursor: pointer; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    #closeCard:hover { background: rgba(255,255,255,0.18); color: white; }

    #galaxyOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: url('textures/milkyway.jpg') center/cover no-repeat;
      opacity: 0;
      transition: opacity 1.2s ease;
      overflow: hidden;
    }
    #galaxyOverlay.visible { opacity: 1; }
    #solarMarker { position: absolute; top: 88%; left: 28%; transform: translate(-50%, -50%); }
    #solarMarker .dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff, 0 0 20px #ffff88; }
    #solarMarker .ring { width: 40px; height: 40px; border: 1.5px solid rgba(255,255,180,0.9); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(255,255,150,0.6); animation: ringPulse 2s ease-in-out infinite; }
    #solarMarker .ring2 { width: 65px; height: 65px; border: 1px solid rgba(255,255,180,0.4); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: ringPulse 2s ease-in-out infinite 0.4s; }
    #solarMarker .label { position: absolute; top: 50%; left: calc(50% + 40px); transform: translateY(-50%); color: rgba(255,255,200,0.9); font-family: sans-serif; font-size: 11px; white-space: nowrap; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,255,150,0.8); }
    @keyframes ringPulse {
      0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.08); }
    }
  </style>
</head>
<body>
  <button id="homeBtn" style="display:none;position:fixed;top:20px;left:20px;z-index:10;padding:10px 20px;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:8px;cursor:pointer;font-size:14px;backdrop-filter:blur(6px);">← Home</button>

  <div id="speedControl" style="position:fixed;bottom:30px;left:30px;z-index:10;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:12px 18px;backdrop-filter:blur(8px);">
    <span style="color:#aaa;font-family:sans-serif;font-size:13px;">Speed</span>
    <input type="range" id="speedSlider" min="0" max="10" value="1" step="0.1" style="width:120px;cursor:pointer;">
    <span id="speedLabel" style="color:white;font-family:sans-serif;font-size:13px;width:30px;">1x</span>
  </div>

  <button id="galaxyBtn" style="position:fixed;top:20px;right:30px;z-index:10;padding:10px 20px;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:8px;cursor:pointer;font-size:14px;backdrop-filter:blur(6px);">🌌 Galaxy View</button>

  <div id="infoCard">
    <button id="closeCard">✕</button>
    <div class="card-header">
      <div class="card-dot"></div>
      <h2 id="cardTitle"></h2>
    </div>
    <div class="row"><span class="label">Diameter</span><span class="value" id="cardDiameter"></span></div>
    <div class="row"><span class="label">Temperature</span><span class="value" id="cardTemp"></span></div>
    <div class="row"><span class="label">Moons</span><span class="value" id="cardMoons"></span></div>
    <div class="fact" id="cardFact"></div>
  </div>

  <div id="galaxyOverlay">
    <button id="galaxyBackBtn" style="position:absolute;top:20px;left:20px;z-index:60;padding:10px 20px;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:8px;cursor:pointer;font-size:14px;backdrop-filter:blur(6px);">← Back</button>
    <div id="solarMarker">
      <div class="ring2"></div>
      <div class="ring"></div>
      <div class="dot"></div>
      <div class="label">YOU ARE HERE</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
