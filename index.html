<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #infoCard {
        display: none;
        position: fixed;
        top: 50%;
        right: 30px;
        transform: translateY(-50%);
        width: 300px;
        background: linear-gradient(135deg, rgba(5, 15, 35, 0.95), rgba(10, 25, 55, 0.95));
        border: 1px solid rgba(100, 180, 255, 0.25);
        border-radius: 20px;
        padding: 28px;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        backdrop-filter: blur(20px);
        z-index: 20;
        box-shadow: 0 0 60px rgba(80, 160, 255, 0.2), 0 20px 40px rgba(0,0,0,0.5);
        animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
        from { opacity: 0; transform: translateY(-50%) translateX(20px); }
        to   { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        #infoCard .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(100, 180, 255, 0.15);
        }

        #infoCard .card-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #7ecfff;
        box-shadow: 0 0 10px #7ecfff;
        }

        #infoCard h2 {
        font-size: 24px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.5px;
        margin: 0;
        }

        #infoCard .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 13px;
        padding: 8px 12px;
        background: rgba(255,255,255,0.04);
        border-radius: 8px;
        }

        #infoCard .label {
        color: #6a9bbf;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.8px;
        }

        #infoCard .value {
        color: #fff;
        font-weight: 600;
        font-size: 13px;
        }

        #infoCard .fact {
        margin-top: 16px;
        font-size: 12px;
        color: #8ab4d4;
        line-height: 1.7;
        background: rgba(100, 180, 255, 0.06);
        border-left: 2px solid rgba(100, 180, 255, 0.4);
        border-radius: 0 8px 8px 0;
        padding: 10px 14px;
        }

        #closeCard {
        position: absolute;
        top: 14px;
        right: 16px;
        background: rgba(255,255,255,0.08);
        border: none;
        color: #aaa;
        font-size: 14px;
        cursor: pointer;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        }
        #closeCard:hover { background: rgba(255,255,255,0.18); color: white; }

        #galaxyOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: url('textures/milkyway.jpg') center/cover no-repeat;
            opacity: 0;
            transition: opacity 1.2s ease;
            overflow: hidden;
        }

        #galaxyOverlay.visible {
            opacity: 1;
        }

        #solarMarker {
            position: absolute;
            top: 88%;
            left: 28%;
            transform: translate(-50%, -50%);
        }

        #solarMarker .dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #fff, 0 0 20px #ffff88;
        }

        #solarMarker .ring {
            width: 40px;
            height: 40px;
            border: 1.5px solid rgba(255, 255, 180, 0.9);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(255,255,150,0.6);
            animation: ringPulse 2s ease-in-out infinite;
        }

        #solarMarker .ring2 {
            width: 65px;
            height: 65px;
            border: 1px solid rgba(255, 255, 180, 0.4);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ringPulse 2s ease-in-out infinite 0.4s;
        }

        #solarMarker .label {
            position: absolute;
            top: 50%;
            left: calc(50% + 40px);
            transform: translateY(-50%);
            color: rgba(255,255,200,0.9);
            font-family: sans-serif;
            font-size: 11px;
            white-space: nowrap;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,255,150,0.8);
        }

        @keyframes ringPulse {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.08); }
        }
  </style>
</head>
<body>
  <button id="homeBtn" style="
    display: none;
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    padding: 10px 20px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    backdrop-filter: blur(6px);
  ">← Home</button>

    <div id="speedControl" style="
        position: fixed;
        bottom: 30px;
        left: 30px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        padding: 12px 18px;
        backdrop-filter: blur(8px);
        ">
        <span style="color: #aaa; font-family: sans-serif; font-size: 13px;">Speed</span>
        <input type="range" id="speedSlider" min="0" max="10" value="1" step="0.1" style="width: 120px; cursor: pointer;">
        <span id="speedLabel" style="color: white; font-family: sans-serif; font-size: 13px; width: 30px;">1x</span>
    </div>

    <button id="galaxyBtn" style="
        position: fixed;
        top: 20px;
        right: 30px;
        z-index: 10;
        padding: 10px 20px;
        background: rgba(255,255,255,0.1);
        color: white;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        backdrop-filter: blur(6px);
    ">🌌 Galaxy View</button>

    <div id="infoCard">
    <button id="closeCard">✕</button>
    <div class="card-header">
        <div class="card-dot"></div>
        <h2 id="cardTitle"></h2>
    </div>
    <div class="row"><span class="label">Diameter</span><span class="value" id="cardDiameter"></span></div>
    <div class="row"><span class="label">Temperature</span><span class="value" id="cardTemp"></span></div>
    <div class="row"><span class="label">Moons</span><span class="value" id="cardMoons"></span></div>
    <div class="fact" id="cardFact"></div>
    </div>

    <div id="galaxyOverlay">
        <div id="solarMarker">
            <div class="ring2"></div>
            <div class="ring"></div>
            <div class="dot"></div>
            <div class="label">YOU ARE HERE</div>
        </div>
    </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { planetInfo } from './planetData.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.TextureLoader().load('textures/space.jpg');
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
    camera.position.set(0, 200, 600);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    let speedMultiplier = 1;
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    speedSlider.addEventListener('input', () => {
        speedMultiplier = parseFloat(speedSlider.value);
        speedLabel.textContent = speedMultiplier.toFixed(1) + 'x';
    });

    // Starfield
    const starGeo = new THREE.BufferGeometry();
    const starCount = 8000;
    const positions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i++) positions[i] = (Math.random() - 0.5) * 10000;
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 })));

    const loader = new THREE.TextureLoader();

    // Sun
    const sunGeo = new THREE.SphereGeometry(30, 32, 32);
    const sunMat = new THREE.MeshBasicMaterial({ map: loader.load('textures/sun.jpg') });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    sun.userData.name = 'Sun';
    scene.add(sun);

    // Sun glow
    const glowColors = [0xFDB813, 0xFF8C00, 0xFF4500];
    const glowSizes = [32, 35, 39];
    glowColors.forEach((color, i) => {
      const g = new THREE.Mesh(
        new THREE.SphereGeometry(glowSizes[i], 32, 32),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.08 - i * 0.02, side: THREE.BackSide })
      );
      scene.add(g);
    });

    // Lighting
    scene.add(new THREE.PointLight(0xffffff, 2, 3000));
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    // Planet data
    const planetData = [
        ['Mercury', 'textures/mercury.jpg',  3.5,  60,  0.047, 0.03, 0.21],
        ['Venus',   'textures/venus.jpg',    6,    90,  0.035, 0.05, 0.007],
        ['Earth',   'textures/earth.jpg',    6.5, 125,  0.029, 0.41, 0.017],
        ['Mars',    'textures/mars.jpg',     5,   165,  0.024, 0.44, 0.093],
        ['Jupiter', 'textures/jupiter.jpg', 15,   250,  0.013, 0.05, 0.049],
        ['Saturn',  'textures/saturn.jpg',  13,   350,  0.009, 0.47, 0.057],
        ['Uranus',  'textures/uranus.jpg',   9,   440,  0.006, 1.71, 0.046],
        ['Neptune', 'textures/neptune.jpg',  8.5, 520,  0.005, 0.49, 0.010],
    ];

    const planets = [];

    planetData.forEach(([name, tex, radius, orbitRadius, speed, tilt, ecc]) => {
        const semiMajor = orbitRadius;
        const semiMinor = orbitRadius * (1 - ecc);

        // Elliptical orbit ring using a custom curve
        const curve = new THREE.EllipseCurve(0, 0, semiMajor, semiMinor, 0, Math.PI * 2, false, 0);
        const points = curve.getPoints(128);
        const orbitGeo = new THREE.BufferGeometry().setFromPoints(points);
        const orbitLine = new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({ color: 0x444444 }));
        orbitLine.rotation.x = Math.PI / 2;
        scene.add(orbitLine);

        const geo = new THREE.SphereGeometry(radius, 32, 32);
        const mat = new THREE.MeshStandardMaterial({ map: loader.load(tex) });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.z = tilt;
        mesh.userData.name = name;
        scene.add(mesh);

        planets.push({ mesh, semiMajor, semiMinor, speed, angle: Math.random() * Math.PI * 2 });
    });

    // Saturn rings
    const saturnRing = new THREE.Mesh(
        new THREE.RingGeometry(16, 26, 64),
        new THREE.MeshBasicMaterial({ 
            map: loader.load('textures/saturn_ring.jpg'),
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.9
        })
    );
    saturnRing.rotation.x = Math.PI / 3;
    scene.add(saturnRing);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Asteroid belt
    const asteroidBelt = new THREE.Group();
    const asteroidGeo = new THREE.SphereGeometry(1.5, 6, 6);

    for (let i = 0; i < 800; i++) {
        const asteroidMat = new THREE.MeshStandardMaterial({ 
            color: new THREE.Color(0.4 + Math.random() * 0.2, 0.35 + Math.random() * 0.15, 0.3 + Math.random() * 0.1)
        });
        const asteroid = new THREE.Mesh(asteroidGeo, asteroidMat);

        const angle = Math.random() * Math.PI * 2;
        const radius = 195 + Math.random() * 35;
        const semiMinor = radius * (1 - 0.05);

        asteroid.position.x = Math.cos(angle) * radius;
        asteroid.position.z = Math.sin(angle) * semiMinor;
        asteroid.position.y = (Math.random() - 0.5) * 8;

        asteroid.rotation.x = Math.random() * Math.PI;
        asteroid.rotation.y = Math.random() * Math.PI;

        const scale = 0.8 + Math.random() * 1.2;
        asteroid.scale.set(scale, scale * 0.7, scale);

        asteroid.userData.orbitRadius = radius;
        asteroid.userData.semiMinor = semiMinor;
        asteroid.userData.angle = angle;
        asteroid.userData.speed = 0.018 + Math.random() * 0.004;

        asteroidBelt.add(asteroid);
    }
    scene.add(asteroidBelt);


        // Comet
    const cometGeo = new THREE.SphereGeometry(4, 8, 8);
    const cometPositions = cometGeo.attributes.position;
    for (let i = 0; i < cometPositions.count; i++) {
        cometPositions.setXYZ(
            i,
            cometPositions.getX(i) * (0.7 + Math.random() * 0.6),
            cometPositions.getY(i) * (0.5 + Math.random() * 0.8),
            cometPositions.getZ(i) * (0.7 + Math.random() * 0.6)
        );
    }
    cometGeo.computeVertexNormals();
    const cometMat = new THREE.MeshStandardMaterial({ 
        map: loader.load('textures/comet.jpg'),
        emissive: new THREE.Color(0x4488ff),
        emissiveIntensity: 0.3
    });
    const comet = new THREE.Mesh(cometGeo, cometMat);
    comet.userData.name = 'Comet';
    scene.add(comet);

    // Comet glow
    const cometGlow = new THREE.Mesh(
        new THREE.SphereGeometry(6, 32, 32),
        new THREE.MeshBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.15, side: THREE.BackSide })
    );
    scene.add(cometGlow);

    // Comet tail (particle system)
    const tailCount = 300;
    const tailGeo = new THREE.BufferGeometry();
    const tailPositions = new Float32Array(tailCount * 3);
    tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPositions, 3));
    const tail = new THREE.Points(tailGeo, new THREE.PointsMaterial({
        color: 0x88ccff,
        size: 2.5,
        transparent: true,
        opacity: 0.5
    }));
    scene.add(tail);

    // Pulsing indicator ring
    const indicatorGeo = new THREE.RingGeometry(5.5, 6, 32);
    const indicatorMat = new THREE.MeshBasicMaterial({ 
        color: 0x88ccff, 
        side: THREE.DoubleSide, 
        transparent: true, 
        opacity: 0.4 
    });
    const cometIndicator = new THREE.Mesh(indicatorGeo, indicatorMat);
    scene.add(cometIndicator);

    // Comet orbit — very stretched ellipse
    const cometSemiMajor = 600;
    const cometSemiMinor = 120;
    let cometAngle = 0;
    const cometSpeed = 0.003;

    // Camera state
    const clickable = [sun, comet, ...planets.map(p => p.mesh)];
    let targetPosition = null;
    let targetLookAt = null;
    let zooming = false;
    const homeBtn = document.getElementById('homeBtn');
    const infoCard = document.getElementById('infoCard');
    const defaultCamPos = new THREE.Vector3(0, 200, 600);
    const defaultLookAt = new THREE.Vector3(0, 0, 0);

    homeBtn.addEventListener('click', () => {
        targetPosition = defaultCamPos.clone();
        targetLookAt = defaultLookAt.clone();
        zooming = true;
        homeBtn.style.display = 'none';
        infoCard.style.display = 'none';
        controls.enabled = true;
        setTimeout(() => { zooming = false; }, 1500);
    });

    const galaxyOverlay = document.getElementById('galaxyOverlay');
    let galaxyView = false;

    galaxyBtn.addEventListener('click', () => {
    if (!galaxyView) {
        galaxyView = true;
        galaxyBtn.textContent = '🔭 Solar System';
        homeBtn.style.display = 'none';
        infoCard.style.display = 'none';
        galaxyOverlay.style.display = 'block';
        setTimeout(() => galaxyOverlay.classList.add('visible'), 10);
        controls.enabled = false;
    } else {
        galaxyView = false;
        galaxyBtn.textContent = '🌌 Galaxy View';
        galaxyOverlay.classList.remove('visible');
        setTimeout(() => {
        galaxyOverlay.style.display = 'none';
        controls.enabled = true;
        }, 1200);
    }
    });

    document.getElementById('closeCard').addEventListener('click', () => {
      infoCard.style.display = 'none';
    });

    window.addEventListener('click', (e) => {
      if (e.target === homeBtn || e.target === document.getElementById('closeCard')) return;

      const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );

      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(clickable);

      if (hits.length > 0) {
        const obj = hits[0].object;
        const name = obj.userData.name || 'Sun';
        const pos = obj.position.clone();
        const radius = obj.geometry.parameters.radius;

        targetPosition = pos.clone().add(new THREE.Vector3(0, radius * 2, radius * 5));
        targetLookAt = pos.clone();
        zooming = true;
        homeBtn.style.display = 'block';
        controls.enabled = false;

        const info = planetInfo[name];
        if (info) {
          document.getElementById('cardTitle').textContent = name;
          document.getElementById('cardDiameter').textContent = info.diameter;
          document.getElementById('cardTemp').textContent = info.temp;
          document.getElementById('cardMoons').textContent = info.moons;
          document.getElementById('cardFact').textContent = info.fact;
          infoCard.style.display = 'block';
        }
      } else {
        infoCard.style.display = 'none';
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      sun.rotation.y += 0.001;

      planets.forEach(p => {
        p.angle += p.speed * 0.01 * speedMultiplier;
        p.mesh.position.x = Math.cos(p.angle) * p.semiMajor;
        p.mesh.position.z = Math.sin(p.angle) * p.semiMinor;
        p.mesh.rotation.y += 0.005;
        if (p.mesh.userData.name === 'Saturn') {
          saturnRing.position.copy(p.mesh.position);
        }
      });
      asteroidBelt.children.forEach(asteroid => {
            asteroid.userData.angle += asteroid.userData.speed * 0.01 * speedMultiplier;
            asteroid.position.x = Math.cos(asteroid.userData.angle) * asteroid.userData.orbitRadius;
            asteroid.position.z = Math.sin(asteroid.userData.angle) * asteroid.userData.semiMinor;
            asteroid.rotation.y += 0.01;
        });

      if (zooming && targetPosition && targetLookAt) {
        camera.position.lerp(targetPosition, 0.05);
        controls.target.lerp(targetLookAt, 0.05);
        if (camera.position.distanceTo(targetPosition) < 0.5) zooming = false;
      }

      controls.update();
      renderer.render(scene, camera);
      // Comet orbit
        cometAngle += cometSpeed * 0.01 * speedMultiplier;
        comet.position.x = Math.cos(cometAngle) * cometSemiMajor;
        comet.position.z = Math.sin(cometAngle) * cometSemiMinor;
        comet.rotation.y += 0.01;

        // Glow follows comet
        cometGlow.position.copy(comet.position);

        // Indicator follows comet and pulses
        cometIndicator.position.copy(comet.position);
        cometIndicator.lookAt(camera.position);
        const pulse = 1 + 0.2 * Math.sin(Date.now() * 0.005);
        cometIndicator.scale.set(pulse, pulse, pulse);

        // Tail points away from Sun
        const sunDir = comet.position.clone().normalize();
        const tailPositionsArr = tail.geometry.attributes.position.array;

        for (let i = 0; i < tailCount; i++) {
            const t = i / tailCount;
            const spread = t * 2;
            tailPositionsArr[i * 3]     = comet.position.x + sunDir.x * t * 80 + (Math.random() - 0.5) * spread * 8;
            tailPositionsArr[i * 3 + 1] = comet.position.y + sunDir.y * t * 80 + (Math.random() - 0.5) * spread * 4;
            tailPositionsArr[i * 3 + 2] = comet.position.z + sunDir.z * t * 80 + (Math.random() - 0.5) * spread * 8;
        }
        tail.geometry.attributes.position.needsUpdate = true;
    }
    animate();
  </script>
</body>
</html>
